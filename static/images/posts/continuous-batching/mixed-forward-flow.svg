<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" width="980" height="520" font-family="'JetBrains Mono', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#121a22"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7d8590"/>
    </marker>
  </defs>

  <rect width="980" height="520" rx="10" fill="url(#bg)"/>
  <text x="490" y="32" text-anchor="middle" fill="#c9d1d9" font-size="18" font-weight="700">One Mixed Iteration: Packed Compute, Separate Semantics</text>
  <text x="490" y="55" text-anchor="middle" fill="#8b949e" font-size="12">A and C are prefill chunks; B is one decode row with cached history.</text>

  <text x="145" y="95" text-anchor="middle" fill="#8b949e" font-size="13" font-weight="700">1. scheduler picks new tokens</text>
  <rect x="32" y="115" width="70" height="42" rx="6" fill="#0a2a3a" stroke="#1ea8d8" stroke-width="2"/>
  <rect x="108" y="115" width="70" height="42" rx="6" fill="#0a2a3a" stroke="#1ea8d8" stroke-width="2"/>
  <rect x="184" y="115" width="70" height="42" rx="6" fill="#0a2a3a" stroke="#1ea8d8" stroke-width="2"/>
  <text x="67" y="140" text-anchor="middle" fill="#79c0ff" font-size="14" font-weight="700">A1</text>
  <text x="143" y="140" text-anchor="middle" fill="#79c0ff" font-size="14" font-weight="700">A2</text>
  <text x="219" y="140" text-anchor="middle" fill="#79c0ff" font-size="14" font-weight="700">A3</text>
  <text x="143" y="176" text-anchor="middle" fill="#58a6ff" font-size="12">Req A prefill</text>

  <rect x="90" y="205" width="70" height="42" rx="6" fill="#0b2a12" stroke="#3fb950" stroke-width="2"/>
  <text x="125" y="231" text-anchor="middle" fill="#7ee787" font-size="14" font-weight="700">B5</text>
  <text x="125" y="266" text-anchor="middle" fill="#56d364" font-size="12">Req B decode</text>

  <rect x="70" y="295" width="70" height="42" rx="6" fill="#2a1608" stroke="#d29922" stroke-width="2"/>
  <rect x="146" y="295" width="70" height="42" rx="6" fill="#2a1608" stroke="#d29922" stroke-width="2"/>
  <text x="105" y="321" text-anchor="middle" fill="#e3b341" font-size="14" font-weight="700">C1</text>
  <text x="181" y="321" text-anchor="middle" fill="#e3b341" font-size="14" font-weight="700">C2</text>
  <text x="143" y="356" text-anchor="middle" fill="#d29922" font-size="12">Req C prefill</text>

  <line x1="270" y1="230" x2="350" y2="230" stroke="#7d8590" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="490" y="95" text-anchor="middle" fill="#8b949e" font-size="13" font-weight="700">2. pack into one matrix</text>
  <rect x="350" y="118" width="280" height="42" rx="6" fill="#0a1420" stroke="#30363d" stroke-width="1.5"/>
  <rect x="362" y="126" width="34" height="26" rx="4" fill="#0a2a3a" stroke="#1ea8d8"/>
  <rect x="402" y="126" width="34" height="26" rx="4" fill="#0a2a3a" stroke="#1ea8d8"/>
  <rect x="442" y="126" width="34" height="26" rx="4" fill="#0a2a3a" stroke="#1ea8d8"/>
  <rect x="482" y="126" width="34" height="26" rx="4" fill="#0b2a12" stroke="#3fb950"/>
  <rect x="522" y="126" width="34" height="26" rx="4" fill="#2a1608" stroke="#d29922"/>
  <rect x="562" y="126" width="34" height="26" rx="4" fill="#2a1608" stroke="#d29922"/>
  <text x="379" y="144" text-anchor="middle" fill="#79c0ff" font-size="10">A1</text>
  <text x="419" y="144" text-anchor="middle" fill="#79c0ff" font-size="10">A2</text>
  <text x="459" y="144" text-anchor="middle" fill="#79c0ff" font-size="10">A3</text>
  <text x="499" y="144" text-anchor="middle" fill="#7ee787" font-size="10">B5</text>
  <text x="539" y="144" text-anchor="middle" fill="#e3b341" font-size="10">C1</text>
  <text x="579" y="144" text-anchor="middle" fill="#e3b341" font-size="10">C2</text>
  <text x="490" y="184" text-anchor="middle" fill="#c9d1d9" font-size="15">X shape = 6 x d</text>
  <text x="490" y="205" text-anchor="middle" fill="#8b949e" font-size="12">physical layout only; request ids and position ids stay separate</text>

  <rect x="370" y="250" width="240" height="58" rx="8" fill="#111826" stroke="#30363d" stroke-width="1.5"/>
  <text x="490" y="274" text-anchor="middle" fill="#c9d1d9" font-size="14" font-weight="700">shared projection</text>
  <text x="490" y="296" text-anchor="middle" fill="#8b949e" font-size="12">Q = X Wq, K = X Wk, V = X Wv</text>
  <line x1="490" y1="212" x2="490" y2="248" stroke="#7d8590" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="630" y1="230" x2="710" y2="230" stroke="#7d8590" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="835" y="95" text-anchor="middle" fill="#8b949e" font-size="13" font-weight="700">3. attention restores boundaries</text>
  <rect x="705" y="118" width="250" height="64" rx="8" fill="#0a2a3a" stroke="#1ea8d8" stroke-width="1.5"/>
  <text x="830" y="143" text-anchor="middle" fill="#79c0ff" font-size="13" font-weight="700">A rows attend A1..A3</text>
  <text x="830" y="164" text-anchor="middle" fill="#8b949e" font-size="11">causal mask inside A chunk</text>

  <rect x="705" y="218" width="250" height="74" rx="8" fill="#0b2a12" stroke="#3fb950" stroke-width="1.5"/>
  <text x="830" y="243" text-anchor="middle" fill="#7ee787" font-size="13" font-weight="700">B row attends KV_B + B5</text>
  <text x="830" y="264" text-anchor="middle" fill="#8b949e" font-size="11">history is read from paged KV cache</text>
  <rect x="724" y="274" width="26" height="10" rx="2" fill="#16351d" stroke="#3fb950"/>
  <rect x="754" y="274" width="26" height="10" rx="2" fill="#16351d" stroke="#3fb950"/>
  <rect x="784" y="274" width="26" height="10" rx="2" fill="#16351d" stroke="#3fb950"/>
  <rect x="814" y="274" width="26" height="10" rx="2" fill="#16351d" stroke="#3fb950"/>
  <text x="878" y="284" text-anchor="middle" fill="#56d364" font-size="10">cache blocks</text>

  <rect x="705" y="328" width="250" height="64" rx="8" fill="#2a1608" stroke="#d29922" stroke-width="1.5"/>
  <text x="830" y="353" text-anchor="middle" fill="#e3b341" font-size="13" font-weight="700">C rows attend C1..C2</text>
  <text x="830" y="374" text-anchor="middle" fill="#8b949e" font-size="11">no row can attend another request</text>

  <rect x="65" y="420" width="850" height="62" rx="8" fill="#111826" stroke="#30363d" stroke-width="1.5"/>
  <text x="490" y="445" text-anchor="middle" fill="#c9d1d9" font-size="14" font-weight="700">Invariant</text>
  <text x="490" y="468" text-anchor="middle" fill="#8b949e" font-size="12">Packing changes kernel shape, not model semantics: each row sees exactly the same context as an isolated request.</text>
</svg>
