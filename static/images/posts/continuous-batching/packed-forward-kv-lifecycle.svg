<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 640" width="1120" height="640" font-family="'JetBrains Mono', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#101820"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b949e"/>
    </marker>
    <marker id="blueArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3fb950"/>
    </marker>
  </defs>

  <rect width="1120" height="640" rx="12" fill="url(#bg)"/>
  <text x="560" y="38" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="700">Packed Forward with KV Cache</text>
  <text x="560" y="64" text-anchor="middle" fill="#8b949e" font-size="13">One kernel sees packed rows; each row keeps its own request boundary, position, and KV-cache lookup.</text>

  <rect x="36" y="108" width="190" height="390" rx="10" fill="#111826" stroke="#30363d" stroke-width="1.5"/>
  <text x="131" y="136" text-anchor="middle" fill="#c9d1d9" font-size="15" font-weight="700">1. scheduler</text>
  <text x="131" y="159" text-anchor="middle" fill="#8b949e" font-size="11">choose new tokens</text>

  <rect x="63" y="190" width="44" height="34" rx="5" fill="#0a2a3a" stroke="#1ea8d8"/>
  <rect x="113" y="190" width="44" height="34" rx="5" fill="#0a2a3a" stroke="#1ea8d8"/>
  <rect x="163" y="190" width="44" height="34" rx="5" fill="#0a2a3a" stroke="#1ea8d8"/>
  <text x="85" y="212" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="700">A1</text>
  <text x="135" y="212" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="700">A2</text>
  <text x="185" y="212" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="700">A3</text>
  <text x="131" y="246" text-anchor="middle" fill="#58a6ff" font-size="12">A prefill chunk</text>

  <rect x="87" y="294" width="44" height="34" rx="5" fill="#0b2a12" stroke="#3fb950"/>
  <rect x="139" y="294" width="44" height="34" rx="5" fill="#0b2a12" stroke="#3fb950"/>
  <text x="109" y="316" text-anchor="middle" fill="#7ee787" font-size="12" font-weight="700">B5</text>
  <text x="161" y="316" text-anchor="middle" fill="#7ee787" font-size="12" font-weight="700">D9</text>
  <text x="131" y="350" text-anchor="middle" fill="#56d364" font-size="12">B/D decode rows</text>

  <rect x="88" y="398" width="44" height="34" rx="5" fill="#2a1608" stroke="#d29922"/>
  <rect x="140" y="398" width="44" height="34" rx="5" fill="#2a1608" stroke="#d29922"/>
  <text x="110" y="420" text-anchor="middle" fill="#e3b341" font-size="12" font-weight="700">C1</text>
  <text x="162" y="420" text-anchor="middle" fill="#e3b341" font-size="12" font-weight="700">C2</text>
  <text x="131" y="454" text-anchor="middle" fill="#d29922" font-size="12">C prefill chunk</text>

  <line x1="226" y1="304" x2="274" y2="304" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="274" y="108" width="230" height="390" rx="10" fill="#111826" stroke="#30363d" stroke-width="1.5"/>
  <text x="389" y="136" text-anchor="middle" fill="#c9d1d9" font-size="15" font-weight="700">2. packed input</text>
  <text x="389" y="159" text-anchor="middle" fill="#8b949e" font-size="11">physical rows only</text>

  <rect x="309" y="202" width="160" height="52" rx="7" fill="#0a1420" stroke="#30363d"/>
  <rect x="323" y="216" width="22" height="24" rx="3" fill="#0a2a3a" stroke="#1ea8d8"/>
  <rect x="349" y="216" width="22" height="24" rx="3" fill="#0a2a3a" stroke="#1ea8d8"/>
  <rect x="375" y="216" width="22" height="24" rx="3" fill="#0a2a3a" stroke="#1ea8d8"/>
  <rect x="401" y="216" width="22" height="24" rx="3" fill="#0b2a12" stroke="#3fb950"/>
  <rect x="427" y="216" width="22" height="24" rx="3" fill="#0b2a12" stroke="#3fb950"/>
  <text x="454" y="233" fill="#8b949e" font-size="11">...</text>
  <text x="389" y="280" text-anchor="middle" fill="#c9d1d9" font-size="13">X = rows from A, B, D, C</text>
  <text x="389" y="328" text-anchor="middle" fill="#8b949e" font-size="11">metadata travels with rows</text>

  <rect x="316" y="370" width="146" height="62" rx="8" fill="#162033" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="389" y="396" text-anchor="middle" fill="#c9d1d9" font-size="14" font-weight="700">shared matmul</text>
  <text x="389" y="418" text-anchor="middle" fill="#8b949e" font-size="11">Q,K,V = XW</text>
  <line x1="389" y1="336" x2="389" y2="368" stroke="#58a6ff" stroke-width="2" marker-end="url(#blueArrow)"/>

  <line x1="504" y1="304" x2="552" y2="304" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="552" y="108" width="260" height="390" rx="10" fill="#111826" stroke="#30363d" stroke-width="1.5"/>
  <text x="682" y="136" text-anchor="middle" fill="#c9d1d9" font-size="15" font-weight="700">3. attention</text>
  <text x="682" y="159" text-anchor="middle" fill="#8b949e" font-size="11">same launch, row-specific context</text>

  <rect x="588" y="195" width="188" height="58" rx="8" fill="#0a2a3a" stroke="#1ea8d8"/>
  <text x="682" y="219" text-anchor="middle" fill="#79c0ff" font-size="13" font-weight="700">prefill rows</text>
  <text x="682" y="240" text-anchor="middle" fill="#8b949e" font-size="11">own chunk/cache only</text>

  <rect x="588" y="294" width="188" height="78" rx="8" fill="#0b2a12" stroke="#3fb950"/>
  <text x="682" y="318" text-anchor="middle" fill="#7ee787" font-size="13" font-weight="700">decode rows</text>
  <text x="682" y="339" text-anchor="middle" fill="#8b949e" font-size="11">B5 sees KV_B + B5</text>
  <text x="682" y="358" text-anchor="middle" fill="#8b949e" font-size="11">D9 sees KV_D + D9</text>

  <rect x="588" y="416" width="188" height="42" rx="8" fill="#201625" stroke="#a371f7"/>
  <text x="682" y="442" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="700">no cross-request attention</text>

  <line x1="812" y1="304" x2="860" y2="304" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="860" y="108" width="224" height="390" rx="10" fill="#111826" stroke="#30363d" stroke-width="1.5"/>
  <text x="972" y="136" text-anchor="middle" fill="#c9d1d9" font-size="15" font-weight="700">4. cache + logits</text>
  <text x="972" y="159" text-anchor="middle" fill="#8b949e" font-size="11">write current K/V, sample selected rows</text>

  <rect x="900" y="206" width="144" height="62" rx="8" fill="#0f2315" stroke="#3fb950"/>
  <text x="972" y="230" text-anchor="middle" fill="#7ee787" font-size="13" font-weight="700">paged KV cache</text>
  <rect x="920" y="244" width="20" height="10" rx="2" fill="#16351d" stroke="#3fb950"/>
  <rect x="945" y="244" width="20" height="10" rx="2" fill="#16351d" stroke="#3fb950"/>
  <rect x="970" y="244" width="20" height="10" rx="2" fill="#16351d" stroke="#3fb950"/>
  <rect x="995" y="244" width="20" height="10" rx="2" fill="#16351d" stroke="#3fb950"/>

  <rect x="900" y="328" width="144" height="58" rx="8" fill="#162033" stroke="#58a6ff"/>
  <text x="972" y="352" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="700">sample logits</text>
  <text x="972" y="373" text-anchor="middle" fill="#8b949e" font-size="11">decode + final prefill rows</text>

  <path d="M907 239 C850 250 835 291 779 321" fill="none" stroke="#3fb950" stroke-width="2" marker-end="url(#greenArrow)"/>
  <path d="M779 348 C835 382 855 422 907 420" fill="none" stroke="#3fb950" stroke-width="2" marker-end="url(#greenArrow)"/>
  <text x="855" y="470" text-anchor="middle" fill="#56d364" font-size="11">read old KV, write new KV</text>

  <rect x="108" y="548" width="904" height="52" rx="8" fill="#111826" stroke="#30363d" stroke-width="1.5"/>
  <text x="560" y="570" text-anchor="middle" fill="#c9d1d9" font-size="14" font-weight="700">Invariant</text>
  <text x="560" y="592" text-anchor="middle" fill="#8b949e" font-size="12">Rows are batched for throughput; each row's visible keys come from its own request metadata and KV block table.</text>
</svg>
