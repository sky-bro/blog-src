<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">Embodied model routes</title>
  <desc id="desc">A square cover showing perception, language, world state, and robot action as connected blocks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102027"/>
      <stop offset="0.55" stop-color="#16313d"/>
      <stop offset="1" stop-color="#23313f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="800" height="800" rx="72" fill="url(#bg)"/>
  <circle cx="625" cy="168" r="92" fill="#ffd166" opacity="0.9"/>
  <circle cx="140" cy="640" r="70" fill="#4ecdc4" opacity="0.7"/>
  <g filter="url(#shadow)">
    <rect x="120" y="150" width="220" height="150" rx="34" fill="#f7fff7"/>
    <rect x="460" y="150" width="220" height="150" rx="34" fill="#ff6b6b"/>
    <rect x="120" y="500" width="220" height="150" rx="34" fill="#4ecdc4"/>
    <rect x="460" y="500" width="220" height="150" rx="34" fill="#f4a261"/>
    <rect x="260" y="330" width="280" height="140" rx="38" fill="#253746" stroke="#f7fff7" stroke-width="8"/>
  </g>
  <g fill="none" stroke="#f7fff7" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <path d="M345 225 C405 225 415 335 470 350"/>
    <path d="M455 225 C390 235 390 325 332 350"/>
    <path d="M330 578 C385 570 400 475 455 438"/>
    <path d="M470 575 C430 548 430 478 462 438"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-weight="800" text-anchor="middle">
    <text x="230" y="215" font-size="34" fill="#102027">VISION</text>
    <text x="230" y="255" font-size="34" fill="#102027">LANGUAGE</text>
    <text x="570" y="240" font-size="44" fill="#fff">ACTION</text>
    <text x="230" y="590" font-size="42" fill="#102027">STATE</text>
    <text x="570" y="590" font-size="42" fill="#102027">WORLD</text>
    <text x="400" y="385" font-size="46" fill="#f7fff7">VLA</text>
    <text x="400" y="430" font-size="34" fill="#ffd166">JEPA / WAM</text>
  </g>
</svg>
