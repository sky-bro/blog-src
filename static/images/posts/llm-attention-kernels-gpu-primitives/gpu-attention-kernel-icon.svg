<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">LLM attention kernels and GPU primitives icon</title>
  <desc id="desc">A GPU chip running an attention tile with memory arrows.</desc>
  <defs>
    <linearGradient id="bg" x1="64" y1="52" x2="448" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#164e63"/>
      <stop offset="0.56" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="chip" x1="132" y1="120" x2="388" y2="388" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ccfbf1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="15" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <g opacity="0.24" stroke="#d1fae5" stroke-width="14" stroke-linecap="round">
    <path d="M82 126h86"/>
    <path d="M82 256h76"/>
    <path d="M82 386h86"/>
    <path d="M426 126h-86"/>
    <path d="M426 256h-76"/>
    <path d="M426 386h-86"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="118" y="118" width="276" height="276" rx="40" fill="url(#chip)"/>
    <rect x="164" y="164" width="184" height="184" rx="24" fill="#0f172a"/>
    <g fill="#2dd4bf">
      <rect x="188" y="188" width="42" height="42" rx="8"/>
      <rect x="238" y="188" width="42" height="42" rx="8"/>
      <rect x="288" y="188" width="42" height="42" rx="8"/>
      <rect x="188" y="238" width="42" height="42" rx="8"/>
      <rect x="238" y="238" width="42" height="42" rx="8"/>
      <rect x="288" y="238" width="42" height="42" rx="8"/>
      <rect x="188" y="288" width="42" height="42" rx="8"/>
      <rect x="238" y="288" width="42" height="42" rx="8"/>
      <rect x="288" y="288" width="42" height="42" rx="8"/>
    </g>
    <path d="M178 338 338 178" stroke="#fbbf24" stroke-width="16" stroke-linecap="round"/>
    <text x="256" y="93" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#fef3c7">GPU</text>
  </g>
