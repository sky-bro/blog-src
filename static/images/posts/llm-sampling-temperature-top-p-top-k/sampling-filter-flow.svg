<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Temperature, top-k, and top-p sampling flow</title>
  <desc id="desc">A diagram showing logits transformed by temperature, filtered by top-k or top-p, renormalized, then sampled.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#293241"/>
    </marker>
    <style>
      .panel { fill: #fbfaf6; stroke: #293241; stroke-width: 2; }
      .title { font: 700 20px Inter, Arial, sans-serif; fill: #293241; }
      .label { font: 600 16px Inter, Arial, sans-serif; fill: #293241; }
      .small { font: 14px Inter, Arial, sans-serif; fill: #4b5563; }
      .axis { stroke: #293241; stroke-width: 3; stroke-linecap: round; }
      .arrow { stroke: #293241; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .keep { fill: #2a9d8f; }
      .maybe { fill: #e9c46a; }
      .drop { fill: #cbd5e1; }
      .hot { fill: #e76f51; }
      .cold { fill: #457b9d; }
    </style>
  </defs>

  <rect width="980" height="560" fill="#f3f0e8"/>

  <rect class="panel" x="34" y="54" width="260" height="214" rx="12"/>
  <text class="title" x="62" y="92">1. logits to probs</text>
  <text class="small" x="62" y="118">softmax(logits / temperature)</text>
  <g transform="translate(66 146)">
    <line class="axis" x1="0" y1="92" x2="196" y2="92"/>
    <rect class="cold" x="8" y="14" width="28" height="78" rx="6"/>
    <rect class="maybe" x="48" y="38" width="28" height="54" rx="6"/>
    <rect class="maybe" x="88" y="66" width="28" height="26" rx="6"/>
    <rect class="drop" x="128" y="80" width="28" height="12" rx="5"/>
    <rect class="drop" x="168" y="86" width="28" height="6" rx="3"/>
    <text class="small" x="22" y="116" text-anchor="middle">A</text>
    <text class="small" x="62" y="116" text-anchor="middle">B</text>
    <text class="small" x="102" y="116" text-anchor="middle">C</text>
    <text class="small" x="142" y="116" text-anchor="middle">D</text>
    <text class="small" x="182" y="116" text-anchor="middle">E</text>
  </g>

  <rect class="panel" x="360" y="54" width="260" height="214" rx="12"/>
  <text class="title" x="388" y="92">2a. top-k by rank</text>
  <text class="small" x="388" y="118">keep exactly the best k tokens</text>
  <g transform="translate(392 146)">
    <line class="axis" x1="0" y1="92" x2="196" y2="92"/>
    <rect class="keep" x="8" y="14" width="28" height="78" rx="6"/>
    <rect class="keep" x="48" y="38" width="28" height="54" rx="6"/>
    <rect class="maybe" x="88" y="66" width="28" height="26" rx="6"/>
    <rect class="drop" x="128" y="80" width="28" height="12" rx="5"/>
    <rect class="drop" x="168" y="86" width="28" height="6" rx="3"/>
    <path d="M124 6v104" stroke="#e76f51" stroke-width="4" stroke-dasharray="8 8"/>
    <text class="label" x="104" y="-8" text-anchor="middle">k = 3</text>
  </g>

  <rect class="panel" x="686" y="54" width="260" height="214" rx="12"/>
  <text class="title" x="714" y="92">2b. top-p by mass</text>
  <text class="small" x="714" y="118">keep until cumulative p is enough</text>
  <g transform="translate(718 146)">
    <line class="axis" x1="0" y1="92" x2="196" y2="92"/>
    <rect class="keep" x="8" y="14" width="28" height="78" rx="6"/>
    <rect class="keep" x="48" y="38" width="28" height="54" rx="6"/>
    <rect class="drop" x="88" y="66" width="28" height="26" rx="6"/>
    <rect class="drop" x="128" y="80" width="28" height="12" rx="5"/>
    <rect class="drop" x="168" y="86" width="28" height="6" rx="3"/>
    <path d="M84 6v104" stroke="#e76f51" stroke-width="4" stroke-dasharray="8 8"/>
    <text class="label" x="82" y="-8" text-anchor="middle">p = 0.8</text>
  </g>

  <path class="arrow" d="M294 162h52"/>
  <path class="arrow" d="M620 162h52"/>

  <rect class="panel" x="174" y="334" width="632" height="158" rx="12"/>
  <text class="title" x="212" y="374">3. renormalize the remaining tokens, then draw one</text>
  <text class="small" x="212" y="402">dropped tokens get probability 0; kept tokens are scaled back to sum to 1</text>
  <g transform="translate(228 428)">
    <rect class="keep" x="0" y="0" width="236" height="34" rx="8"/>
    <rect class="keep" x="250" y="0" width="128" height="34" rx="8"/>
    <rect class="maybe" x="392" y="0" width="72" height="34" rx="8"/>
    <rect class="drop" x="478" y="0" width="42" height="34" rx="8"/>
    <rect class="drop" x="534" y="0" width="26" height="34" rx="8"/>
    <text class="label" x="118" y="56" text-anchor="middle">A</text>
    <text class="label" x="314" y="56" text-anchor="middle">B</text>
    <text class="label" x="428" y="56" text-anchor="middle">C</text>
    <text class="small" x="499" y="56" text-anchor="middle">D</text>
    <text class="small" x="547" y="56" text-anchor="middle">E</text>
  </g>

  <path class="arrow" d="M490 268v52"/>
  <text class="small" x="514" y="300">top-k and top-p can both be active</text>
</svg>
