<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Floating point bit layout and spacing</title>
  <desc id="desc">A diagram showing sign, exponent, and mantissa bits for FP32, BF16, FP16, and FP8 formats, plus local spacing near one.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1b2432" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#243042"/>
    </marker>
  </defs>

  <rect width="1200" height="820" rx="30" fill="#f7f3e8"/>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" fill="#172033">
    <text x="600" y="50" font-size="32" font-weight="800" text-anchor="middle">Floating Point = Sign + Exponent + Mantissa</text>
    <text x="600" y="82" font-size="17" text-anchor="middle" fill="#526073">more exponent bits widen range; more mantissa bits make nearby representable numbers closer</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" filter="url(#shadow)">
    <rect x="64" y="116" width="1072" height="278" rx="22" fill="#ffffff"/>
    <rect x="64" y="432" width="520" height="306" rx="22" fill="#e8f1ff"/>
    <rect x="616" y="432" width="520" height="306" rx="22" fill="#eef8f0"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="94" y="154" font-size="22" font-weight="800" fill="#172033">Bit layout</text>
    <text x="94" y="184" font-size="15" fill="#526073">Each box is a bit field. Exponent moves the decimal scale; mantissa fills in values inside that scale.</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#172033">
    <text x="96" y="232" font-weight="800">FP32</text>
    <rect x="176" y="207" width="30" height="34" rx="5" fill="#f4c95d"/>
    <rect x="210" y="207" width="202" height="34" rx="5" fill="#6aa9e9"/>
    <rect x="416" y="207" width="585" height="34" rx="5" fill="#60c2a4"/>
    <text x="191" y="230" text-anchor="middle" font-weight="800">1</text>
    <text x="311" y="230" text-anchor="middle" font-weight="800">8 exponent</text>
    <text x="708" y="230" text-anchor="middle" font-weight="800">23 mantissa</text>

    <text x="96" y="288" font-weight="800">BF16</text>
    <rect x="176" y="263" width="30" height="34" rx="5" fill="#f4c95d"/>
    <rect x="210" y="263" width="202" height="34" rx="5" fill="#6aa9e9"/>
    <rect x="416" y="263" width="178" height="34" rx="5" fill="#60c2a4"/>
    <text x="191" y="286" text-anchor="middle" font-weight="800">1</text>
    <text x="311" y="286" text-anchor="middle" font-weight="800">8 exponent</text>
    <text x="505" y="286" text-anchor="middle" font-weight="800">7 mantissa</text>
    <text x="638" y="286" fill="#526073">same exponent width as FP32, shorter mantissa</text>

    <text x="96" y="344" font-weight="800">FP16</text>
    <rect x="176" y="319" width="30" height="34" rx="5" fill="#f4c95d"/>
    <rect x="210" y="319" width="126" height="34" rx="5" fill="#6aa9e9"/>
    <rect x="340" y="319" width="254" height="34" rx="5" fill="#60c2a4"/>
    <text x="191" y="342" text-anchor="middle" font-weight="800">1</text>
    <text x="273" y="342" text-anchor="middle" font-weight="800">5 exponent</text>
    <text x="467" y="342" text-anchor="middle" font-weight="800">10 mantissa</text>
    <text x="638" y="342" fill="#526073">less range than BF16, finer local spacing</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="852" y="150" width="22" height="22" rx="5" fill="#f4c95d"/>
    <text x="884" y="167" font-size="15" fill="#526073">sign</text>
    <rect x="944" y="150" width="22" height="22" rx="5" fill="#6aa9e9"/>
    <text x="976" y="167" font-size="15" fill="#526073">range</text>
    <rect x="1048" y="150" width="22" height="22" rx="5" fill="#60c2a4"/>
    <text x="1080" y="167" font-size="15" fill="#526073">precision</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" fill="#172033">
    <text x="94" y="472" font-size="22" font-weight="800">Local spacing near 1.0</text>
    <text x="112" y="552" font-size="18" font-weight="800">BF16</text>
    <line x1="180" y1="546" x2="500" y2="546" stroke="#243042" stroke-width="4" stroke-linecap="round"/>
    <g stroke="#243042" stroke-width="3" stroke-linecap="round">
      <line x1="222" y1="526" x2="222" y2="566"/>
      <line x1="326" y1="526" x2="326" y2="566"/>
      <line x1="430" y1="526" x2="430" y2="566"/>
    </g>
    <text x="222" y="594" font-size="14" text-anchor="middle">1.000000</text>
    <text x="326" y="594" font-size="14" text-anchor="middle">1.0078125</text>
    <text x="430" y="594" font-size="14" text-anchor="middle">1.015625</text>
    <path d="M 222 512 C 250 486, 298 486, 326 512" fill="none" stroke="#c66b3d" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="274" y="486" font-size="14" text-anchor="middle" fill="#a24e2b">step = 2^-7</text>

    <text x="112" y="640" font-size="18" font-weight="800">FP16</text>
    <line x1="180" y1="634" x2="500" y2="634" stroke="#243042" stroke-width="4" stroke-linecap="round"/>
    <g stroke="#243042" stroke-width="3" stroke-linecap="round">
      <line x1="222" y1="614" x2="222" y2="654"/>
      <line x1="274" y1="618" x2="274" y2="650"/>
      <line x1="326" y1="618" x2="326" y2="650"/>
      <line x1="378" y1="618" x2="378" y2="650"/>
      <line x1="430" y1="614" x2="430" y2="654"/>
    </g>
    <text x="222" y="682" font-size="14" text-anchor="middle">1.000000</text>
    <text x="430" y="682" font-size="14" text-anchor="middle">1.00390625</text>
    <path d="M 222 604 C 236 588, 260 588, 274 604" fill="none" stroke="#c66b3d" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="248" y="580" font-size="14" text-anchor="middle" fill="#a24e2b">step = 2^-10</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" fill="#172033">
    <text x="646" y="472" font-size="22" font-weight="800">The same tradeoff explains FP8</text>
    <text x="646" y="500" font-size="15" fill="#526073">with only eight bits, the exponent/mantissa split is visible</text>

    <text x="666" y="552" font-size="18" font-weight="800">E4M3</text>
    <rect x="740" y="528" width="30" height="34" rx="5" fill="#f4c95d"/>
    <rect x="774" y="528" width="122" height="34" rx="5" fill="#6aa9e9"/>
    <rect x="900" y="528" width="92" height="34" rx="5" fill="#60c2a4"/>
    <text x="755" y="551" text-anchor="middle" font-size="15" font-weight="800">1</text>
    <text x="835" y="551" text-anchor="middle" font-size="15" font-weight="800">4 exp</text>
    <text x="946" y="551" text-anchor="middle" font-size="15" font-weight="800">3 mant</text>
    <text x="740" y="590" font-size="15" fill="#526073">more local precision</text>
    <text x="740" y="614" font-size="15" fill="#526073">less range</text>

    <text x="666" y="642" font-size="18" font-weight="800">E5M2</text>
    <rect x="740" y="618" width="30" height="34" rx="5" fill="#f4c95d"/>
    <rect x="774" y="618" width="152" height="34" rx="5" fill="#6aa9e9"/>
    <rect x="930" y="618" width="62" height="34" rx="5" fill="#60c2a4"/>
    <text x="755" y="641" text-anchor="middle" font-size="15" font-weight="800">1</text>
    <text x="850" y="641" text-anchor="middle" font-size="15" font-weight="800">5 exp</text>
    <text x="961" y="641" text-anchor="middle" font-size="15" font-weight="800">2 mant</text>
    <text x="740" y="680" font-size="15" fill="#526073">more range</text>
    <text x="740" y="704" font-size="15" fill="#526073">coarser local precision</text>
  </g>
</svg>
