<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">vLLM GPUModelRunner execution map</title>
  <desc id="desc">A source-reading map from SchedulerOutput through GPUWorker and GPUModelRunner to attention, model forward, logits, sampling, and output state.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
      .runner { fill: #ecfdf5; stroke: #059669; stroke-width: 2; }
      .model { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
      .out { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; }
      .box { rx: 10; ry: 10; }
      .title { font: 700 20px sans-serif; fill: #0f172a; }
      .label { font: 700 16px sans-serif; fill: #0f172a; }
      .small { font: 13px sans-serif; fill: #334155; }
      .tiny { font: 12px sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="520"/>
  <text class="title" x="42" y="44">GPUModelRunner turns a scheduled token batch into GPU execution</text>

  <rect class="lane box" x="42" y="92" width="190" height="110"/>
  <text class="label" x="68" y="128">SchedulerOutput</text>
  <text class="small" x="68" y="155">req ids</text>
  <text class="small" x="68" y="176">scheduled tokens</text>
  <text class="small" x="68" y="197">KV block decisions</text>

  <rect class="lane box" x="278" y="92" width="175" height="110"/>
  <text class="label" x="308" y="128">GPUWorker</text>
  <text class="small" x="308" y="155">PP receive/send</text>
  <text class="small" x="308" y="176">runner dispatch</text>
  <text class="tiny" x="308" y="197">V1 or V2 runner</text>

  <rect class="runner box" x="500" y="75" width="240" height="144"/>
  <text class="label" x="528" y="111">GPUModelRunner</text>
  <text class="small" x="528" y="139">update persistent batch</text>
  <text class="small" x="528" y="160">build input tensors</text>
  <text class="small" x="528" y="181">choose graph / ubatch</text>
  <text class="small" x="528" y="202">slot mapping + attention metadata</text>

  <rect class="model box" x="802" y="75" width="270" height="144"/>
  <text class="label" x="830" y="111">Forward Context</text>
  <text class="small" x="830" y="139">attention metadata</text>
  <text class="small" x="830" y="160">KV cache slot mapping</text>
  <text class="small" x="830" y="181">CUDA graph runtime mode</text>
  <text class="small" x="830" y="202">microbatch slices</text>

  <rect class="model box" x="500" y="298" width="240" height="130"/>
  <text class="label" x="528" y="334">Model Forward</text>
  <text class="small" x="528" y="362">input_ids / embeds</text>
  <text class="small" x="528" y="383">positions</text>
  <text class="small" x="528" y="404">intermediate tensors</text>

  <rect class="out box" x="802" y="298" width="270" height="130"/>
  <text class="label" x="830" y="334">Postprocess</text>
  <text class="small" x="830" y="362">hidden states -> logits</text>
  <text class="small" x="830" y="383">sample tokens</text>
  <text class="small" x="830" y="404">update request state</text>

  <path class="arrow" d="M 232 147 L 278 147"/>
  <path class="arrow" d="M 453 147 L 500 147"/>
  <path class="arrow" d="M 740 147 L 802 147"/>
  <path class="arrow" d="M 937 219 C 937 260 740 258 690 298"/>
  <path class="arrow" d="M 740 363 L 802 363"/>
  <path class="dash" d="M 872 428 C 760 475 438 475 184 206"/>

  <text class="tiny" x="70" y="247">Scheduler decides what can run this step.</text>
  <text class="tiny" x="500" y="247">Runner materializes how it runs on GPU.</text>
  <text class="tiny" x="802" y="247">Attention layers read metadata from forward context.</text>
  <text class="tiny" x="772" y="470">Sampled tokens feed the next scheduling step.</text>
</svg>
