<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Adam versus AdamW weight decay</title>
  <desc id="desc">Adam mixes weight decay into the adaptive moment path, while AdamW applies decoupled weight decay as a separate update path.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#374151"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 15px Inter, Arial, sans-serif; fill: #5b6472; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .bad { fill: #fff1f2; stroke: #f06b6b; }
      .good { fill: #ecfdf5; stroke: #2f9e69; }
      .node { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 12; }
      .node-blue { fill: #eef6ff; stroke: #4f8edb; }
      .node-green { fill: #f0fdf4; stroke: #2f9e69; }
      .node-red { fill: #fff7ed; stroke: #f08c35; }
      .head { font: 700 22px Inter, Arial, sans-serif; fill: #111827; }
      .body { font: 600 15px Inter, Arial, sans-serif; fill: #374151; }
      .small { font: 500 13px Inter, Arial, sans-serif; fill: #5b6472; }
      .line { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .decay { stroke: #2f9e69; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .mix { stroke: #e25555; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .formula { font: 700 18px Inter, Arial, sans-serif; fill: #1f2937; }
    </style>
  </defs>

  <rect class="bg" width="1120" height="560"/>
  <text x="56" y="54" class="title">Adam vs AdamW: where weight decay enters</text>
  <text x="56" y="82" class="subtitle">The key change is not a new momentum rule; it is decoupling regularization from adaptive gradient scaling.</text>

  <rect x="56" y="122" width="488" height="360" class="panel bad"/>
  <text x="84" y="160" class="head">Adam with L2-style decay</text>

  <rect x="92" y="206" width="110" height="54" class="node node-blue"/>
  <text x="120" y="239" class="body">gradient g</text>

  <rect x="92" y="306" width="110" height="54" class="node node-red"/>
  <text x="120" y="339" class="body">lambda theta</text>

  <rect x="256" y="256" width="118" height="70" class="node"/>
  <text x="282" y="286" class="body">mix into</text>
  <text x="283" y="308" class="body">gradient</text>

  <rect x="414" y="248" width="100" height="86" class="node"/>
  <text x="442" y="279" class="body">Adam</text>
  <text x="438" y="301" class="small">m and v</text>
  <text x="426" y="322" class="small">then scaling</text>

  <path d="M202 233 H256" class="line"/>
  <path d="M202 333 C226 333 232 291 256 291" class="mix"/>
  <path d="M374 291 H414" class="line"/>
  <text x="92" y="415" class="small">Regularization strength is entangled with per-parameter history.</text>
  <text x="92" y="444" class="formula">update uses moments of (g + lambda theta)</text>

  <rect x="576" y="122" width="488" height="360" class="panel good"/>
  <text x="604" y="160" class="head">AdamW decoupled decay</text>

  <rect x="612" y="218" width="110" height="54" class="node node-blue"/>
  <text x="640" y="251" class="body">gradient g</text>

  <rect x="784" y="206" width="108" height="78" class="node"/>
  <text x="812" y="237" class="body">Adam</text>
  <text x="808" y="259" class="small">m and v</text>

  <rect x="930" y="218" width="104" height="54" class="node node-blue"/>
  <text x="958" y="251" class="body">step</text>

  <rect x="784" y="342" width="108" height="64" class="node node-green"/>
  <text x="810" y="370" class="body">decay</text>
  <text x="804" y="392" class="small">- eta lambda theta</text>

  <path d="M722 245 H784" class="line"/>
  <path d="M892 245 H930" class="line"/>
  <path d="M838 342 V284" class="decay"/>
  <text x="612" y="444" class="formula">update = Adam gradient step + separate weight decay</text>
</svg>
