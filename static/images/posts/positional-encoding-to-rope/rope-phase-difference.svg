<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">RoPE phase difference</title>
  <desc id="desc">Two position rotations on the unit circle leave only the relative phase difference in the dot product.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; rx: 14; }
      .axis { stroke: #64748b; stroke-width: 2; }
      .circle { fill: none; stroke: #475569; stroke-width: 2; }
      .q { stroke: #38bdf8; fill: none; stroke-width: 5; marker-end: url(#arrow); }
      .k { stroke: #f59e0b; fill: none; stroke-width: 5; marker-end: url(#arrow); }
      .arc { fill: none; stroke: #22c55e; stroke-width: 5; marker-end: url(#arrow); }
      .text { fill: #e5e7eb; font-family: Inter, Arial, sans-serif; font-size: 24px; }
      .small { fill: #cbd5e1; font-family: Inter, Arial, sans-serif; font-size: 18px; }
      .math { fill: #f8fafc; font-family: "Times New Roman", serif; font-size: 30px; }
      .muted { fill: #94a3b8; font-family: Inter, Arial, sans-serif; font-size: 17px; }
      .legend { fill: #cbd5e1; font-family: Inter, Arial, sans-serif; font-size: 16px; }
      .dot-q { fill: #38bdf8; }
      .dot-k { fill: #f59e0b; }
      .dot-d { fill: #22c55e; }
    </style>
  </defs>
  <rect class="bg" width="920" height="420"/>
  <rect class="panel" x="28" y="26" width="864" height="368"/>

  <g transform="translate(238 214)">
    <line class="axis" x1="-150" y1="0" x2="150" y2="0"/>
    <line class="axis" x1="0" y1="150" x2="0" y2="-150"/>
    <circle class="circle" r="118"/>
    <path class="q" d="M 0 0 L 72 -94"/>
    <path class="k" d="M 0 0 L 111 -40"/>
    <path class="arc" d="M 73 -94 A 118 118 0 0 1 111 -40"/>
    <text class="muted" x="-132" y="166">two absolute rotations</text>
  </g>

  <g transform="translate(520 90)">
    <text class="text" x="0" y="0">RoPE geometry</text>
    <text class="small" x="0" y="42">query and key rotate by absolute position.</text>
    <text class="small" x="0" y="76">The dot product keeps only the phase gap.</text>
    <text class="math" x="0" y="144">R(mθ)ᵀ R(nθ) = R((n-m)θ)</text>
    <text class="math" x="0" y="202">score depends on n - m</text>
    <circle class="dot-q" cx="0" cy="244" r="6"/>
    <text class="legend" x="18" y="250">q at mθ</text>
    <circle class="dot-k" cx="112" cy="244" r="6"/>
    <text class="legend" x="130" y="250">k at nθ</text>
    <circle class="dot-d" cx="226" cy="244" r="6"/>
    <text class="legend" x="244" y="250">Δ = (n - m)θ</text>
    <text class="muted" x="0" y="286">Position becomes an angle in attention space.</text>
  </g>
</svg>
