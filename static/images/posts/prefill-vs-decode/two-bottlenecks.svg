<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Prefill and decode bottlenecks</title>
  <desc id="desc">Prefill runs many prompt tokens as dense matrix-matrix work, while decode advances one token per request and repeatedly reads the KV cache.</desc>
  <defs>
    <linearGradient id="prefill-bg" x1="70" y1="70" x2="450" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="decode-bg" x1="530" y1="70" x2="900" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c2d12"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="980" height="420" rx="28" fill="#0f172a"/>
  <g filter="url(#shadow)">
    <rect x="48" y="48" width="420" height="324" rx="24" fill="url(#prefill-bg)"/>
    <rect x="512" y="48" width="420" height="324" rx="24" fill="url(#decode-bg)"/>
  </g>
  <text x="258" y="96" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#f8fafc">PREFILL</text>
  <text x="722" y="96" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#f8fafc">DECODE</text>
  <text x="258" y="130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#dbeafe">many prompt tokens, one forward</text>
  <text x="722" y="130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#fde68a">one new token per request</text>

  <g transform="translate(92 162)">
    <g fill="#dbeafe">
      <rect x="0" y="0" width="42" height="42" rx="8"/>
      <rect x="52" y="0" width="42" height="42" rx="8"/>
      <rect x="104" y="0" width="42" height="42" rx="8"/>
      <rect x="156" y="0" width="42" height="42" rx="8"/>
      <rect x="208" y="0" width="42" height="42" rx="8"/>
      <rect x="260" y="0" width="42" height="42" rx="8"/>
    </g>
    <text x="151" y="78" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">prompt tokens</text>
    <path d="M151 94v46" stroke="#f8fafc" stroke-width="8" stroke-linecap="round"/>
    <path d="M151 154 135 132h32Z" fill="#f8fafc"/>
    <rect x="35" y="176" width="268" height="58" rx="16" fill="#f8fafc"/>
    <text x="169" y="214" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f172a">GEMM</text>
  </g>

  <g transform="translate(554 156)">
    <rect x="0" y="24" width="86" height="56" rx="14" fill="#fef3c7"/>
    <text x="43" y="59" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">q</text>
    <path d="M98 52h54" stroke="#f8fafc" stroke-width="8" stroke-linecap="round"/>
    <path d="M166 52 144 36v32Z" fill="#f8fafc"/>
    <g fill="#e9d5ff">
      <rect x="172" y="0" width="42" height="42" rx="8"/>
      <rect x="224" y="0" width="42" height="42" rx="8"/>
      <rect x="276" y="0" width="42" height="42" rx="8"/>
      <rect x="328" y="0" width="42" height="42" rx="8"/>
      <rect x="172" y="58" width="42" height="42" rx="8"/>
      <rect x="224" y="58" width="42" height="42" rx="8"/>
      <rect x="276" y="58" width="42" height="42" rx="8"/>
      <rect x="328" y="58" width="42" height="42" rx="8"/>
    </g>
    <text x="265" y="136" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">read KV cache history</text>
    <rect x="98" y="178" width="234" height="58" rx="16" fill="#f8fafc"/>
    <text x="215" y="216" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#0f172a">GEMV + HBM</text>
  </g>

</svg>
