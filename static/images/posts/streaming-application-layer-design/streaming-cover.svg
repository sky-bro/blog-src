<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">Application-layer streaming</title>
  <desc id="desc">A square icon showing upload chunks, application frames, and download events.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#10231f"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity=".28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f8fafc"/>
    </marker>
  </defs>

  <rect width="640" height="640" rx="56" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="82" y="184" width="132" height="272" rx="24" fill="#f8fafc"/>
    <rect x="426" y="184" width="132" height="272" rx="24" fill="#f8fafc"/>
    <rect x="244" y="154" width="152" height="332" rx="28" fill="#0f766e"/>
  </g>

  <text x="148" y="162" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">UPLOAD</text>
  <text x="320" y="132" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">APP</text>
  <text x="492" y="162" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">STREAM</text>

  <g fill="#14b8a6">
    <rect x="112" y="230" width="72" height="36" rx="8"/>
    <rect x="112" y="288" width="72" height="36" rx="8"/>
    <rect x="112" y="346" width="72" height="36" rx="8"/>
  </g>
  <g fill="#f59e0b">
    <rect x="278" y="214" width="84" height="44" rx="10"/>
    <rect x="278" y="298" width="84" height="44" rx="10"/>
    <rect x="278" y="382" width="84" height="44" rx="10"/>
  </g>
  <g fill="#38bdf8">
    <circle cx="492" cy="248" r="24"/>
    <circle cx="492" cy="320" r="24"/>
    <circle cx="492" cy="392" r="24"/>
  </g>

  <path d="M 218 320 H 266" stroke="#f8fafc" stroke-width="12" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M 398 320 H 446" stroke="#f8fafc" stroke-width="12" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="320" y="564" text-anchor="middle" fill="#d1d5db" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600">bytes need meaning</text>
</svg>
